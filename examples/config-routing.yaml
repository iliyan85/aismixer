# Example only. This file is not loaded unless you copy/adapt it as config.yaml.
#
# This is a full AISMixer configuration that demonstrates static logical
# routing. It intentionally does not enable the runtime control socket.
#
# Routing source IDs and target IDs are internal opaque identifiers. They are
# separate from emitted NMEA TAG s values.

station_id: mixstation_1
debug: true

sec_inputs:
  # sec_inputs[].id may still be used as the emitted TAG s alias when
  # station_id is empty. It does not replace the authenticated routing identity.
  #
  # UDPSEC routing source IDs come from authenticated station_id values, for
  # example:
  #   udpsec:rPiAIS002
  #   udpsec:vitara_mobile
  - id: secure_listener_alias
    listen_ip: "::"
    listen_port: 29999
    # Optional application allow-list. Omit allow_from for no application ACL;
    # use [] to deny all.
    allow_from:
      - 2001:db8:42::/64
      - 203.0.113.44

udp_inputs:
  # udp_inputs[].id is the preferred UDP routing source identity:
  #   id: balchik_roof -> udp:balchik_roof
  - id: balchik_roof
    listen_ip: "0.0.0.0"
    listen_port: 17778
    allow_from:
      - 192.0.2.15
      - 198.51.100.0/24

  # Another UDP receiver on a different port:
  #   id: dock_gate -> udp:dock_gate
  - id: dock_gate
    listen_ip: "::"
    listen_port: 17779
    allow_from:
      - 2001:db8:42::/64

forwarders:
  # forwarders[].id becomes the canonical UDP routing target ID:
  #   id: aishub -> udp:aishub
  - id: aishub
    host: 192.0.2.20
    port: 10110
    # Optional outbound source bind. Omit source_ip to let the OS choose.
    source_ip: 192.0.2.15

  #   id: local_debug -> udp:local_debug
  - id: local_debug
    host: 127.0.0.1
    port: 19000

udp_alias_map_file: udp_alias_map.yaml

g_preserve_ingress_gid: true
g_id_digits: 18
g_always_tag_single: false
c_preserve_ingress_c: true

routing:
  # Zones contain logical source IDs, not geographic AIS regions.
  # Set-operation operands are names of other zones.
  zones:
    fixed_udp:
      include:
        - udp:balchik_roof
        - udp:dock_gate

    secure_stations:
      include:
        - udpsec:rPiAIS002
        - udpsec:vitara_mobile

    public_receivers:
      include:
        - udp:balchik_roof
        - udpsec:rPiAIS002

    trusted_sources:
      union:
        - fixed_udp
        - secure_stations

    public_fixed_sources:
      intersection:
        - fixed_udp
        - public_receivers

    debug_excluded:
      include:
        - udpsec:vitara_mobile

    public_platform_sources:
      difference:
        - trusted_sources
        - debug_excluded

  routes:
    # In routing mode, deduplication is scoped by target ID. The same AIS
    # sentence can be sent once to udp:local_debug and once to udp:aishub, while
    # overlapping routes to the same target still produce one send within the
    # deduplication TTL.
    - name: trusted_to_local_debug
      from_zone: trusted_sources
      to:
        - udp:local_debug

    - name: public_platforms
      from_zone: public_platform_sources
      to:
        - udp:aishub

    - name: public_fixed_overlap
      from_zone: public_fixed_sources
      to:
        - udp:aishub

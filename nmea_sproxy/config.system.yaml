# Singleton systemd service config: one local input (UDP or serial) -> one
# network output (UDPSEC or UDP).
#
# Leave input and output omitted for the legacy behavior:
# local UDP input -> UDPSEC output.
listen_ip: '::'
listen_port: 50000
# Optional application-level ACL for local UDP senders. Omit for unrestricted.
# An empty list denies all local UDP packets.
# allow_from:
#   - 2001:db8:42::15
#   - 2001:db8:42::/64
remote_host: 192.0.2.10
remote_port: 17777
# Optional legacy UDPSEC outbound source bind. Omit to let the OS choose.
# source_ip: 192.0.2.20
#
# Inactive explicit UDPSEC output example. It uses the same station keys and
# UDPSEC session settings as legacy remote_host/remote_port.
# output:
#   type: udpsec
#   host: mixer.example.net
#   port: 19999
#   source_ip: 192.0.2.20
#
# Inactive local UDP input -> plain UDP output example. Leave input omitted.
# Plain UDP is for trusted LAN/VPN environments only.
# output:
#   type: udp
#   host: 192.168.10.20
#   port: 17777
#   source_ip: 192.168.10.15
#
# Inactive Linux serial input example. The port string is passed unchanged to
# pySerial; replace <device-id> with the receiver-specific value.
# input:
#   type: serial
#   port: /dev/serial/by-id/usb-SRT_Marine_Technology_Ltd._AIS_Virtual_COM_Port_<device-id>-if00
#   baudrate: 38400
#   bytesize: 8
#   parity: N
#   stopbits: 1
#   read_timeout: 1.0
#   reconnect_delay: 5
#   max_line_bytes: 4096
#
# Inactive Windows serial input example.
# input:
#   type: serial
#   port: COM4
#   baudrate: 38400
#   bytesize: 8
#   parity: N
#   stopbits: 1
#   read_timeout: 1.0
#   reconnect_delay: 5
#   max_line_bytes: 4096
#
# Inactive serial input -> UDPSEC output example:
#   uncomment one serial input block above and either keep the legacy
#   remote_host/remote_port fields or uncomment output.type: udpsec above.
#
# Inactive serial input -> plain UDP output example:
#   uncomment one serial input block above and uncomment this output block.
# output:
#   type: udp
#   host: 192.168.10.20
#   port: 17777
#   source_ip: 192.168.10.15
station_id: boat_001
keepalive_interval: 30
peer_timeout: 90
session_refresh_interval: 0

station_private_key: /etc/nmea_sproxy/keys/station_private.pem
remote_public_key: /etc/nmea_sproxy/keys/aismixer_public.pem

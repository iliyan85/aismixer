# One nmea_sproxy process is one 1:1 secure shovel:
# listen_ip/listen_port -> remote_host/remote_port.
listen_ip: '::'
listen_port: 50000
remote_host: 192.0.2.10
remote_port: 17777
station_id: boat_001

station_private_key: /etc/nmea_sproxy/keys/station_private.pem
remote_public_key: /etc/nmea_sproxy/keys/aismixer_public.pem

# Manual runs from this directory fall back to the legacy local key filenames
# when the service key paths above do not exist.

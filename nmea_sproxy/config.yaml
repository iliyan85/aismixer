# One nmea_sproxy process is one 1:1 UDPSEC proxy:
# listen_ip/listen_port -> remote_host/remote_port.
listen_ip: '::'
listen_port: 50000
# Optional application-level ACL for local UDP senders. Omit for unrestricted.
# An empty list denies all local UDP packets.
# allow_from:
#   - 2001:db8:42::15
#   - 2001:db8:42::/64
remote_host: 192.0.2.10
remote_port: 17777
# Optional outbound UDPSEC source bind. Omit to let the OS choose.
# source_ip: 192.0.2.20
station_id: boat_001
keepalive_interval: 30
peer_timeout: 90
session_refresh_interval: 0

station_private_key: station_private.pem
remote_public_key: aismixer_public.pem

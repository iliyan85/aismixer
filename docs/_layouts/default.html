<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="robots" content="index,follow">
  <meta name="theme-color" content="#0b1220">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/img/aismixer-social-preview-1280x640.png' | absolute_url }}">
  <meta property="og:image:secure_url" content="{{ '/assets/img/aismixer-social-preview-1280x640.png' | absolute_url }}">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1280">
  <meta property="og:image:height" content="640">
  <meta property="og:image:alt" content="AISMixer AIS stream processing and routing platform overview">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description | escape }}">
  <meta name="twitter:image" content="{{ '/assets/img/aismixer-social-preview-1280x640.png' | absolute_url }}">
  <meta name="twitter:image:alt" content="AISMixer AIS stream processing and routing platform overview">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <!-- Website content synchronized with AISMixer main at {{ site.source_sync_commit }} -->
  <nav class="nav" aria-label="Primary navigation">
    <div class="container nav-inner">
      <a class="brand" href="/" aria-label="AISMixer home">
        <span class="logo" aria-hidden="true">🛰️</span>
        <span class="brand-name">AISMixer</span>
        <span class="chip">AIS stream platform</span>
      </a>
      <div class="toggles">
        <a class="btn" href="/">Home</a>
        <a class="btn" href="https://github.com/iliyan85/aismixer/wiki" target="_blank" rel="noopener">GitHub Wiki</a>
        <a class="btn" href="https://github.com/iliyan85/aismixer" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </nav>

  <main class="container section">
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <div class="chip">© 2026 AISMixer project</div>
    </div>
  </footer>
</body>
</html>

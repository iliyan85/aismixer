<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="robots" content="index,follow">
  <meta name="theme-color" content="#0b1220">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/img/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/" aria-label="AISMixer home">
        <span class="logo" aria-hidden="true">A</span>
        <span class="brand-name">AISMixer</span>
        <span class="chip">AIS multiplexer &amp; forward</span>
      </a>
      <div class="toggles">
        <a class="btn" href="/">Home</a>
        <a class="btn" href="/technical/secure-udp-protocol/">Secure UDP</a>
        <a class="btn" href="https://github.com/iliyan85/aismixer" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </nav>

  <main class="container section">
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <div class="chip">AISMixer project</div>
    </div>
  </footer>
  <script src="/assets/js/main.js"></script>
</body>
</html>

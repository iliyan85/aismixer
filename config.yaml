sec_inputs:
  - listen_ip: 0.0.0.0
    listen_port: 19999
    id: secA
    # Optional application-level ingress ACL. Omit allow_from for unrestricted.
    # An empty list denies all.
    # allow_from:
    #   - 203.0.113.44
    #   - 198.51.100.0/24

udp_inputs:
  - listen_ip: 0.0.0.0
    listen_port: 17778
    id: null
    # allow_from:
    #   - 192.0.2.15
    #   - 198.51.100.0/24
  - listen_ip: "::"
    listen_port: 17770
    id: null
    # allow_from:
    #   - 2001:db8:42::/64

forwarders:
  - host: 127.0.0.1
    port: 19000
    # Optional outbound source bind. Omit source_ip to let the OS choose.
    # source_ip: 192.0.2.15
  - host: 127.0.0.1
    port: 19001

udp_alias_map_file: udp_alias_map.yaml

station_id: mixstation_1

# --- g policy ---
# Ако е true и в ingress TAG има \g:x-y-gid\, пазим това gid; иначе винаги генерираме ново.
g_preserve_ingress_gid: true
# Дължина на генерираното числово gid (без водещи нули)
g_id_digits: 18
# Ако е true, добавяме g и при единични изречения като 1-1-<gid>
g_always_tag_single: false

# --- c policy ---
# Ако е true и в ingress TAG има \c:<unix_ts>\, пазим тази стойност;
# ако е false или няма \c:..., ползваме текущото време на сървъра.
c_preserve_ingress_c: true

debug: true
